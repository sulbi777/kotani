name: KoTani CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Instalasi C dependency dipindah ke atas agar siap digunakan oleh package Python jika dibutuhkan
      - name: Install C dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librdkafka-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r kotani-backend/requirements.txt
          pip install pytest bandit

      - name: Run Bandit Security Scan
        run: bandit -r kotani-backend/

      - name: Build Backend Docker Image
        run: docker build -t kotani-backend:latest ./kotani-backend

      # [Langkah-langkah Anda sebelumnya ada di sini...]
      
      - name: Build Backend Docker Image
        run: docker build -t kotani-backend:latest ./kotani-backend

      # --- TAMBAHKAN BAGIAN INI ---

      - name: Log in to Docker Hub
        # Hanya jalankan push jika ini adalah event push ke branch main, bukan pull request
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Docker Image
        if: github.event_name == 'push'
        run: |
          # Ganti tag agar sesuai dengan format Docker Hub: username/nama-image:tag
          docker tag kotani-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/kotani-backend:latest
          
          # Push image ke Docker Hub
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kotani-backend:latest
